<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ request.url_for('static', path='brand/site-favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff',
              100: '#e0e7ff',
              500: '#6b74f0',
              600: '#5d67df',
              700: '#4b56c9',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Be Vietnam Pro', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  <div class="min-h-screen">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-4xl items-center justify-between px-6 py-4">
        <a href="{{ home_url }}" class="font-display text-lg font-semibold text-slate-900">{{ app_name }}</a>
        <nav class="flex items-center gap-3 text-sm font-medium">
          <a href="{{ home_url }}" class="rounded-lg px-3 py-2 {% if active_page == 'home' %}bg-slate-100 text-slate-900{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">Home</a>
          <a href="{{ privacy_url }}" class="rounded-lg px-3 py-2 {% if active_page == 'privacy' %}bg-slate-100 text-slate-900{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">Privacy</a>
          <a href="{{ terms_url }}" class="rounded-lg px-3 py-2 {% if active_page == 'terms' %}bg-slate-100 text-slate-900{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">Terms</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-4xl px-6 py-10">
      <article class="rounded-2xl border border-slate-200 bg-white p-8">
        <header class="border-b border-slate-200 pb-6">
          <p class="text-sm font-semibold text-brand-600">{{ app_name }}</p>
          <h1 class="mt-2 font-display text-3xl font-semibold text-slate-900">{{ legal_title }}</h1>
          <p class="mt-3 text-sm text-slate-500">Last updated: {{ legal_updated_at }}</p>
        </header>

        <div class="mt-8 space-y-8">
          {% for section in legal_sections %}
          <section>
            <h2 class="font-display text-lg font-semibold text-slate-900">{{ section.heading }}</h2>
            <div class="mt-3 space-y-3 text-sm leading-7 text-slate-600">
              {% for paragraph in section.body %}
              <p>{{ paragraph }}</p>
              {% endfor %}
            </div>
          </section>
          {% endfor %}
        </div>
      </article>
    </main>
  </div>
</body>
</html>
