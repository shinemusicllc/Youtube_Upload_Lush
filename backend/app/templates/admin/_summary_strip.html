<div class="panel grid overflow-hidden md:grid-cols-3 xl:grid-cols-6">
    {% for item in dashboard.summary_strip %}
    <div class="relative border-b border-slate-200/70 px-5 py-5 text-center last:border-b-0 md:border-r md:last:border-r-0 xl:border-b-0">
        <p class="text-[11px] font-medium text-slate-500">{{ item.label }}</p>
        <p class="mt-3 font-display text-[28px] font-bold leading-none tracking-tight text-slate-900">{{ item.value }}</p>
        <div class="absolute bottom-0 left-1/2 h-[3px] w-12 -translate-x-1/2 rounded-full" style="background-color: {{ item.bar_color }};"></div>
    </div>
    {% endfor %}
</div>
