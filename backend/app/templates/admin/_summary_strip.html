<div class="panel grid grid-cols-2 overflow-hidden md:auto-cols-fr md:grid-flow-col">
    {% for item in dashboard.summary_strip %}
    <div class="relative border-b border-slate-200/70 px-3 py-4 text-center odd:border-r odd:border-slate-200/70 last:border-b-0 md:border-r md:px-5 md:py-5 md:last:border-r-0 md:odd:border-r xl:border-b-0">
        <div class="flex items-center justify-center gap-2">
            <p class="text-[10px] font-medium text-slate-500 md:text-[11px]">{{ item.label }}</p>
            <i data-lucide="{{ item.icon }}" class="h-3.5 w-3.5 {{ item.icon_class }}"></i>
        </div>
        <p class="mt-2.5 font-display text-[22px] font-bold leading-none tracking-tight md:mt-3 md:text-[28px] {{ item.value_class }}">{{ item.value }}</p>
        <div class="mt-2 md:mt-2.5">
            <span class="inline-flex items-center rounded-full border px-2.5 py-1 text-[10px] font-semibold {{ item.accent_badge_class }}">
                {{ item.accent }}
            </span>
        </div>
        <div class="absolute bottom-0 left-1/2 h-[3px] w-12 -translate-x-1/2 rounded-full" style="background-color: {{ item.bar_color }};"></div>
    </div>
    {% endfor %}
</div>
