<div class="panel grid overflow-hidden md:auto-cols-fr md:grid-flow-col">
    {% for item in dashboard.summary_strip %}
    <div class="relative border-b border-slate-200/70 px-5 py-5 text-center last:border-b-0 md:border-r md:last:border-r-0 xl:border-b-0">
        <div class="flex items-center justify-center gap-2">
            <p class="text-[11px] font-medium text-slate-500">{{ item.label }}</p>
            <i data-lucide="{{ item.icon }}" class="h-3.5 w-3.5 {{ item.icon_class }}"></i>
        </div>
        <p class="mt-3 font-display text-[28px] font-bold leading-none tracking-tight {{ item.value_class }}">{{ item.value }}</p>
        <div class="mt-2.5">
            <span class="inline-flex items-center rounded-full border px-2.5 py-1 text-[10px] font-semibold {{ item.accent_badge_class }}">
                {{ item.accent }}
            </span>
        </div>
        <div class="absolute bottom-0 left-1/2 h-[3px] w-12 -translate-x-1/2 rounded-full" style="background-color: {{ item.bar_color }};"></div>
    </div>
    {% endfor %}
</div>
