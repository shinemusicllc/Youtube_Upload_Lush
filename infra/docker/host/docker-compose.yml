services:
  app:
    build:
      context: ../../..
      dockerfile: infra/docker/host/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../../.env.production
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - app_data:/app/backend/data

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_data:
  caddy_data:
  caddy_config:
